name: Sync Heaven schedule

on:
  schedule:
    - cron: '8 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/sync-venry-schedule.js
        env:
          VENRY_LOGIN_ID: ${{ secrets.VENRY_LOGIN_ID }}
          VENRY_PASSWORD: ${{ secrets.VENRY_PASSWORD }}
      - name: Commit schedule update
        run: |
          if git diff --quiet -- schedule.json; then
            echo "No schedule changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git commit -m "Update Heaven schedule"
          git push
